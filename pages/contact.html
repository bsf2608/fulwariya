<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Fulwariya Technologies</title>
    <link rel="stylesheet" href="../css/landing.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .contact-form input, .contact-form textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 15px;
            color: var(--text-main);
            margin-bottom: 20px;
            font-family: 'Inter', sans-serif;
        }
        .contact-form input:focus, .contact-form textarea:focus {
            outline: none;
            border-color: var(--accent-1);
            background: rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <!-- Navigation -->
    <nav class="glass-nav">
        <div class="nav-content">
            <a href="../index.html" class="logo"><i class="fa-solid fa-layer-group"></i><span>Fulwariya Tech</span></a>
            <div class="nav-links">
                <a href="../index.html" class="nav-text-link">Home</a>
            </div>
        </div>
    </nav>

    <header class="hero" style="min-height: 40vh; padding-top: 150px; padding-bottom: 20px;">
        <div class="hero-content">
            <h1>Let's <span class="gradient-text">Connect</span></h1>
            <p>Ready to deploy your next big idea or need assistance with FINBI?</p>
        </div>
    </header>

    <section class="section-container" style="padding-top: 0; padding-bottom: 100px;">
        <div style="display: flex; flex-wrap: wrap; gap: 40px; max-width: 1000px; margin: 0 auto;">
            
            <div class="glass-panel" style="flex: 1; min-width: 300px;">
                <h2 style="font-size: 2rem; margin-bottom: 20px;">Get in Touch</h2>
                <div style="margin-bottom: 30px; display: flex; align-items: center; gap: 15px; font-size: 1.1rem;">
                    <i class="fa-solid fa-envelope" style="color: var(--accent-1); font-size: 1.5rem;"></i>
                    <a href="mailto:support@fulwariya.in" style="color: var(--text-main); text-decoration: none;">support@fulwariya.in</a>
                </div>
                <div style="display: flex; align-items: center; gap: 15px; font-size: 1.1rem; color: var(--text-muted);">
                    <i class="fa-solid fa-location-dot" style="color: var(--accent-3); font-size: 1.5rem;"></i>
                    <span>India</span>
                </div>
            </div>

            <div class="glass-panel" style="flex: 1.5; min-width: 300px;">
                <form class="contact-form" onsubmit="event.preventDefault(); alert('Message feature coming soon!');">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <input type="text" placeholder="Full Name" required style="margin-bottom: 0;">
                        <input type="email" placeholder="Email Address" required style="margin-bottom: 0;">
                        <input type="tel" placeholder="Phone Number" required style="margin-bottom: 0;">
                        <input type="text" placeholder="Subject" required style="margin-bottom: 0;">
                    </div>
                    
                    <h4 style="margin: 20px 0 10px; font-weight: 500;">Location Details</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                        <input type="text" placeholder="State" required style="margin-bottom: 0;">
                        <input type="text" placeholder="District" required style="margin-bottom: 0;">
                        <input type="text" placeholder="City / Town" required style="margin-bottom: 0;">
                        <input type="text" placeholder="Village (Optional)" style="margin-bottom: 0;">
                    </div>

                    <textarea rows="5" placeholder="How can we help you in detail?" required></textarea>
                    <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Send Message <i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="logo" style="justify-content: center; margin-bottom: 10px; font-size: 1.2rem;">
                <i class="fa-solid fa-layer-group"></i> Fulwariya Tech
            </div>
            <p>&copy; 2026 Fulwariya Technologies.</p>
        </div>
    </footer>

    <script>
        window.addEventListener('scroll', () => {
            document.querySelector('.glass-nav').style.background = window.scrollY > 50 ? 'rgba(10, 10, 15, 0.95)' : 'rgba(255, 255, 255, 0.03)';
            document.querySelector('.glass-nav').style.boxShadow = window.scrollY > 50 ? '0 10px 30px rgba(0,0,0,0.5)' : 'none';
        });
    </script>
</body>
</html>
